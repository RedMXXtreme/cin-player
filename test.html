<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Test Player</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f1115;
            color: #ffffff;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #ffffff;
        }
        
        .controls {
            background: #1a1d24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #2a2f3a;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        input[type="text"] {
            flex: 1;
            min-width: 300px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #3a404a;
            background: #0f1115;
            color: #ffffff;
            font-family: inherit;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #1d4ed8;
        }
        
        button.secondary {
            background: #374151;
        }
        
        button.secondary:hover {
            background: #4b5563;
        }
        
        .status {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }
        
        .status-dot.playing {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }
        
        .video-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2f3a;
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }
        
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .video-container:hover .video-controls {
            opacity: 1;
        }
        
        .progress-container {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            background: #2563eb;
            width: 0%;
            border-radius: 2px;
        }
        
        .time-display {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #94a3b8;
            min-width: 120px;
            text-align: right;
        }
        
        .error {
            color: #ef4444;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            margin-top: 10px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .test-sources {
            margin-top: 20px;
            background: #1a1d24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2f3a;
        }
        
        .test-sources h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
        }
        
        .source-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
        }
        
        .source-item {
            background: #0f1115;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #2a2f3a;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .source-item:hover {
            border-color: #3b82f6;
            background: #151820;
        }
        
        .source-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: #e5e7eb;
        }
        
        .source-desc {
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 HLS Test Player</h1>
        
        <div class="controls">
            <div class="input-group">
                <input type="text" id="m3u8Url" placeholder="Enter M3U8 URL (e.g., https://example.com/stream.m3u8)">
                <button onclick="loadStream()">Load Stream</button>
                <button class="secondary" onclick="togglePlay()">Play/Pause</button>
                <button class="secondary" onclick="stopStream()">Stop</button>
            </div>
            
            <div class="status">
                <div class="status-item">
                    <div id="statusDot" class="status-dot"></div>
                    <span id="statusText">Ready</span>
                </div>
                <div class="status-item">
                    <span>Quality:</span>
                    <select id="qualitySelect" onchange="changeQuality()">
                        <option value="auto">Auto</option>
                    </select>
                </div>
                <div class="status-item">
                    <span>Buffer:</span>
                    <span id="bufferText">0%</span>
                </div>
            </div>
            
            <div id="error" class="error"></div>
        </div>
        
        <div class="video-container">
            <video id="video" controls></video>
            <div class="video-controls">
                <button onclick="togglePlay()">⏯️</button>
                <div class="progress-container" onclick="seekVideo(event)">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
                </div>
            </div>
        </div>
        
        <div class="test-sources">
            <h3>Test Sources</h3>
            <div class="source-list">
                <div class="source-item" onclick="loadTestSource('https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8')">
                    <div class="source-title">Sintel (HLS)</div>
                    <div class="source-desc">Open source demo stream</div>
                </div>
                <div class="source-item" onclick="loadTestSource('https://multiplatform-f.akamaihd.net/i/multi/will/bunny/big_buck_bunny_,640x360_400,640x360_700,640x360_1000,950x540_1500,.f4v.csmil/master.m3u8')">
                    <div class="source-title">Big Buck Bunny</div>
                    <div class="source-desc">Apple HLS test stream</div>
                </div>
                <div class="source-item" onclick="loadTestSource('https://demo.unified-streaming.com/k8s/features/bbb-av1-uhd-isobmff/playlist.mpd')">
                    <div class="source-title">AV1 UHD (DASH)</div>
                    <div class="source-desc">DASH stream for testing</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        let hls = null;
        let video = document.getElementById('video');
        let isPlaying = false;
        
        // Status elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const errorDiv = document.getElementById('error');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const bufferText = document.getElementById('bufferText');
        const qualitySelect = document.getElementById('qualitySelect');
        
        function updateStatus(status, isPlaying = false) {
            statusText.textContent = status;
            statusDot.classList.toggle('playing', isPlaying);
        }
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
        
        function hideError() {
            errorDiv.classList.remove('show');
        }
        
        function formatTime(seconds) {
            if (!isFinite(seconds) || seconds < 0) return '00:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : `${m}:${s.toString().padStart(2,'0')}`;
        }
        
        function updateProgress() {
            if (!video) return;
            
            const current = video.currentTime;
            const duration = video.duration;
            
            if (isFinite(duration) && duration > 0) {
                const percent = (current / duration) * 100;
                progressBar.style.width = `${percent}%`;
                currentTimeEl.textContent = formatTime(current);
                durationEl.textContent = formatTime(duration);
            }
            
            // Update buffer
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const bufferPercent = (bufferedEnd / duration) * 100;
                bufferText.textContent = `${Math.round(bufferPercent)}%`;
            }
        }
        
        function loadStream() {
            const url = document.getElementById('m3u8Url').value.trim();
            if (!url) {
                showError('Please enter a valid M3U8 URL');
                return;
            }
            
            stopStream();
            hideError();
            updateStatus('Loading...', false);
            
            // Use proxy for M3U8 source
            const proxiedUrl = 'https://cin-m3u8-proxy-production.up.railway.app/m3u8-proxy?url=' + encodeURIComponent(url);
            
            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90
                });
                
                hls.loadSource(proxiedUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    updateStatus('Ready to play', false);
                    populateQualities();
                    video.play().catch(e => {
                        console.warn('Autoplay failed:', e);
                        updateStatus('Ready (autoplay blocked)', false);
                    });
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                showError('Network error - check URL and connection');
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                showError('Media error - stream may be corrupted');
                                break;
                            default:
                                showError('Fatal error: ' + data.type);
                                break;
                        }
                        updateStatus('Error', false);
                    }
                });
                
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS support (Safari)
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    updateStatus('Ready (Native HLS)', false);
                    video.play().catch(e => {
                        console.warn('Autoplay failed:', e);
                        updateStatus('Ready (autoplay blocked)', false);
                    });
                });
            } else {
                showError('HLS is not supported in this browser');
                updateStatus('HLS not supported', false);
                return;
            }
        }
        
        function loadTestSource(url) {
            document.getElementById('m3u8Url').value = url;
            loadStream();
        }
        
        function stopStream() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.src = '';
            video.load();
            updateStatus('Stopped', false);
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '00:00';
            durationEl.textContent = '00:00';
            bufferText.textContent = '0%';
            qualitySelect.innerHTML = '<option value="auto">Auto</option>';
        }
        
        function togglePlay() {
            if (video.paused) {
                video.play().then(() => {
                    updateStatus('Playing', true);
                }).catch(e => {
                    showError('Play failed: ' + e.message);
                });
            } else {
                video.pause();
                updateStatus('Paused', false);
            }
        }
        
        function seekVideo(event) {
            if (!video.duration) return;
            
            const rect = event.currentTarget.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const width = rect.width;
            const percent = x / width;
            
            video.currentTime = percent * video.duration;
        }
        
        function populateQualities() {
            if (!hls) return;
            
            const levels = hls.levels;
            qualitySelect.innerHTML = '<option value="auto">Auto</option>';
            
            levels.forEach((level, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = level.height ? `${level.height}p` : `Level ${index + 1}`;
                qualitySelect.appendChild(option);
            });
        }
        
        function changeQuality() {
            if (!hls) return;
            
            const value = qualitySelect.value;
            if (value === 'auto') {
                hls.currentLevel = -1; // Auto
            } else {
                hls.currentLevel = parseInt(value);
            }
        }
        
        // Event listeners
        video.addEventListener('play', () => updateStatus('Playing', true));
        video.addEventListener('pause', () => updateStatus('Paused', false));
        video.addEventListener('ended', () => updateStatus('Ended', false));
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('loadedmetadata', updateProgress);
        
        // Auto-update progress
        setInterval(updateProgress, 1000);
    </script>
</body>
</html>
